services:
  database-engine:
    image: "postgres:18-alpine"
    container_name: database-engine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    command: ["postgres", "-c", "log_statement=none", "-c", "wal_level=logical"]
    volumes:
      - database-engine-volume:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toilav-network

  database-pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: database-pgadmin
    networks:
      - toilav-network
    ports:
      - 5433:80
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=password
      - PGADMIN_CONFIG_SERVER_MODE=False
      # - PGADMIN_CONFIG_SESSION_COOKIE_SAMESITE='Lax'
      # - PGADMIN_CONFIG_SESSION_COOKIE_SECURE=False
      # - PGADMIN_CONFIG_WTF_CSRF_ENABLED=False
      # - PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT=False
      # - PGADMIN_CONFIG_WTF_CSRF_HEADERS=['X-CSRFToken','X-CSRF-Token']
      # - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    depends_on:
      - database-engine
    volumes:
      - pgadmin-volume:/var/lib/pgadmin/

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-volume:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toilav-network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/products &&
      mc anonymous set public local/products
      "
    networks:
      - toilav-network

  api:
    build:
      context: ./app/services/database
      dockerfile: Dockerfile
    container_name: toilav-api
    restart: always
    env_file:
      - .env
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=products
      - MINIO_PUBLIC_URL=http://localhost:9000
    ports:
      - "8000:8000"
    depends_on:
      database-engine:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - toilav-network

  frontend:
    build:
      context: ./app/services/frontend
      dockerfile: Dockerfile
    container_name: toilav-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - toilav-network

  # chatbot:
  #   build:
  #     context: ./app/services/chatbot
  #     dockerfile: Dockerfile
  #   container_name: toilav-chatbot
  #   restart: always
  #   env_file:
  #     - .env
  #   environment:
  #     - POSTGRES_HOST=database-engine
  #   ports:
  #     - "8001:8001"
