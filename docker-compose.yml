services:
  database-engine:
    image: "postgres:18-alpine"
    container_name: database-engine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    command: ["postgres", "-c", "log_statement=none", "-c", "wal_level=logical"]
    volumes:
      - database-engine-volume:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toilav-network

  database-pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: database-pgadmin
    networks:
      - toilav-network
    ports:
      - 5433:80
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=password
      - PGADMIN_CONFIG_SERVER_MODE=False
      # - PGADMIN_CONFIG_SESSION_COOKIE_SAMESITE='Lax'
      # - PGADMIN_CONFIG_SESSION_COOKIE_SECURE=False
      # - PGADMIN_CONFIG_WTF_CSRF_ENABLED=False
      # - PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT=False
      # - PGADMIN_CONFIG_WTF_CSRF_HEADERS=['X-CSRFToken','X-CSRF-Token']
      # - PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION=False
    depends_on:
      - database-engine
    volumes:
      - pgadmin-volume:/var/lib/pgadmin/

  database-builder:
    build:
      context: ./app/services/database
      dockerfile: Dockerfile
    container_name: database-builder
    restart: "no"
    env_file:
      - .env
    depends_on:
      database-engine:
        condition: service_healthy
    networks:
      - toilav-network

  api:
    build:
      context: ./app/services/api
      dockerfile: Dockerfile
    container_name: toilav-api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      database-builder:
        condition: service_completed_successfully
    networks:
      - toilav-network
      
  frontend:
    build:
      context: ./app/services/frontend
      dockerfile: Dockerfile
    container_name: toilav-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - toilav-network
volumes:
  database-engine-volume:
  pgadmin-volume:

networks:
  toilav-network: